<!DOCTYPE html>
<html>
<head>
    <title>LA VIE Admin</title>
    <meta charset="UTF-8">
    <style>
        body {
            background: #050505;
            color: #f5f0e8;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
        }
        input, button {
            padding: 12px;
            margin: 10px;
            background: #1a1a1a;
            border: 1px solid #b38a52;
            color: white;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            background: #b38a52;
            color: black;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            opacity: 0.9;
        }
        .error {
            color: #ff6666;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h2>🔐 لوحة تحكم LA VIE</h2>
    <p>أدخل كلمة السر للدخول</p>
    <input type="password" id="password" placeholder="كلمة السر">
    <br>
    <button onclick="checkPassword()">دخول</button>
    <div id="error" class="error"></div>

    <script>
        function checkPassword() {
            var pass = document.getElementById("password").value;
            if (pass === "lavie2025") {
                window.location.href = "/admin-dashboard.html";
            } else {
                document.getElementById("error").innerHTML = "كلمة سر خاطئة";
            }
        }
    </script>
</body>
</html>
